version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cat-adoption-frontend
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=/api
    command: npm run dev -- --host 0.0.0.0 --port 5174
    networks:
      - cat-adoption-network
    restart: unless-stopped

networks:
  cat-adoption-network:
    driver: bridge
